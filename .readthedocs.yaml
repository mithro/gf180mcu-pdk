version: 2

# build.os and build.tools are required by the Read the Docs v2 config
# schema. Docs dependencies are installed with pip (python.install below),
# so build.tools.python is a plain Python version.
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py

python:
  install:
  - requirements: docs/requirements.txt

submodules:
  include: all

# HTML only. PDF (LaTeX) output adds ~7 min to the build (sphinx-latex +
# latexmk), which exceeds Read the Docs' 15-minute community build-time
# limit. Re-enable on a tier with a higher limit.
formats: []
